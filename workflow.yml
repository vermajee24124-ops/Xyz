name: Veda Pipeline

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours; safe to run repeatedly, it auto-resumes

permissions:
  contents: read

concurrency:
  group: veda-pipeline
  cancel-in-progress: false   # never run two batches at once against the same output repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Veda pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          HF_SOURCE_REPO_ID: "Kumarverma11/PocketFM_Audio"
          HF_SOURCE_REPO_TYPE: "dataset"
          HF_SOURCE_FOLDER: "Transcripts_Episode_0001_to_0200"
          HF_OUTPUT_REPO_ID: "Kumarverma11/PocketFM_Audio"
          HF_OUTPUT_REPO_TYPE: "dataset"
          HF_EXPORT_FOLDER: "Veda_Final_Training_Export_0001_to_0200"
          TOTAL_EPISODES: "200"
          BATCH_SIZE: "20"
          MAX_EPISODES_THIS_RUN: "40"
          PROVIDER_TIME_BUDGET_SECONDS: "600"
        run: python main.py
