name: VEDA AI Automated Pipeline

on:
  workflow_dispatch: # मैन्युअल रन करने के लिए
  schedule:
    - cron: '0 */6 * * *' # हर 6 घंटे में ऑटोमैटिक चलेगा

jobs:
  run-veda-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install openai google-generativeai huggingface_hub requests

      - name: Run VEDA Engine
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: python main.py
        
