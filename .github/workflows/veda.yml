name: VEDA AI Automated Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-veda-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ghante tak bina ruke chalne ki permission

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install openai google-generativeai huggingface_hub requests

      - name: Run VEDA Engine
        env:
          PYTHONUNBUFFERED: "1"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: python main.py
        
